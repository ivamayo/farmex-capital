<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmex Capital · Portal del Productor</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/screens.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sb">
    <div class="sb-logo">
      <div class="sb-brand-main">FARMEX CAPITAL</div>
      <div class="sb-brand-tagline">EL PORTAL DE PRODUCTORES</div>
      <div class="sb-brand-peru">🌿 Perú · 2026</div>
    </div>

    <div class="sb-sec">
      <div class="sb-lbl">Principal</div>
      <button class="ni" data-screen="encuesta" style="background:rgba(200,150,30,.12);border-left:3px solid var(--gold);padding-left:7px;"><div class="ni-ico">📋</div><span>Registrarme</span><span class="ni-badge" style="background:var(--gold);color:var(--g-dark);">Nuevo</span></button>
      <button class="ni" data-screen="dashboard"> <div class="ni-ico">🏠</div><span>Mi Finca</span></button>
      <button class="ni" data-screen="servicios">  <div class="ni-ico">🛠️</div><span>Nuestros Servicios</span></button>
      <button class="ni" data-screen="parcelas">  <div class="ni-ico">🌱</div><span>Mis Hectáreas</span></button>
      <button class="ni" data-screen="creditos">  <div class="ni-ico">💰</div><span>Créditos</span><span class="ni-badge">2</span></button>
      <button class="ni" data-screen="mercado">   <div class="ni-ico">📈</div><span>Mercado</span></button>
      <button class="ni" data-screen="vitrina">   <div class="ni-ico">🌿</div><span>Mi Vitrina</span></button>
    </div>

    <div class="sb-sec">
      <div class="sb-lbl">Análisis</div>
      <button class="ni" data-screen="scoring"><div class="ni-ico">⭐</div><span>Mi Score</span></button>
      <button class="ni" data-screen="clima">  <div class="ni-ico">🌤️</div><span>Clima &amp; Riesgos</span><span class="ni-badge red">!</span></button>
    </div>

    <div class="sb-bot">
      <div class="uc">
        <div class="uc-av">RG</div>
        <div>
          <div class="uc-name">Raúl García</div>
          <div class="uc-role">La Libertad · 32 ha · Palta</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div>
        <div class="tb-h1" id="tb-title">Dashboard</div>
        <div class="tb-sub" id="tb-sub">Cargando...</div>
      </div>
      <div class="tb-r">
        <div class="tb-date">📅 13 Mayo 2026</div>
        <div class="tb-bell">🔔<div class="bell-dot"></div></div>
      </div>
    </header>

    <!-- Screen container — filled dynamically by app.js -->
    <div class="content" id="app-content"></div>
  </div>

  <!-- App entry point (ES module) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
